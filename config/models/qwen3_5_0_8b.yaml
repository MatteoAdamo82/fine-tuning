# Qwen/Qwen3.5-0.8B - modello demo/test
# HuggingFace: https://huggingface.co/Qwen/Qwen3.5-0.8B
# Ollama: qwen3.5:0.8b (se disponibile) o qwen3.5 (vedi ollama list)
# Architettura: qwen3_5 (multimodale VLM, usabile text-only)

model:
  hf_id: Qwen/Qwen3.5-0.8B
  ollama_tag: qwen3.5:0.8b
  architecture: qwen3_5
  model_class: AutoModelForImageTextToText
  parameters: 0.8B

resources:
  vram_min_gb: 2
  vram_recommended_gb: 4
  ram_cpu_gb: 4

training:
  lora_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  batch_size: 2
  gradient_accumulation_steps: 8
  max_seq_length: 512
  lora_r: 8
  lora_alpha: 16

export:
  gguf: true
  ollama: true
  ollama_model_name: agente-qwen35
